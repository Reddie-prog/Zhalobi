version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: zhalobi
      POSTGRES_USER: zhalobi_user
      POSTGRES_PASSWORD: zhalobi_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zhalobi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhalobi_user -d zhalobi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://zhalobi_user:zhalobi_pass@postgres:5432/zhalobi
      SECRET_KEY: zhalobi-super-secret-key-change-in-production
      ESCALATION_HOURS: 72
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zhalobi-net
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - zhalobi-net

networks:
  zhalobi-net:
    driver: bridge

volumes:
  postgres_data:
